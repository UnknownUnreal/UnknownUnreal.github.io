<a href="character/hosibito/aries.html" class="char-card-link">

            <!-- ダミーで枠を増やしておきます -->
            <script>
                // 実際にはHTMLを直接書くのがSEO的に良いですが、
                // プレビュー用にJavaScriptでカードを増やしてみます
                const grid = document.querySelector('.character-grid');
                for(let i=3; i<=15; i++) {
                    grid.innerHTML += `
                    <div class="char-card fade-in">
                        <div class="char-img-wrapper">
                            <div class="no-img-placeholder">HOSIBITO ${i}</div>
                            <div class="char-overlay"><p class="char-description">ホシビトとの15分間の対話をお楽しみください。</p></div>
                        </div>
                        <div class="char-info">
                            <span class="constellation-name">CONSTELLATION</span>
                            <h3>第${i}のホシビト</h3>
                        </div>
                    </div>`;
                }
            </script>
